packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@better-auth/drizzle-adapter": ^1.5.6
  "@hookform/resolvers": ^5.2.2
  "@types/node": ^24
  better-auth: ^1.5.6
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.1
  nanoid: ^5.1.7
  postgres: ^3.4.8
  react-hook-form: ^7.72.0
  react-hot-toast: ^2.6.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
